name: Android Build

on:
  push:
    branches: [ main ] # main 브랜치에 push될 때 동작

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build with Gradle
        run: ./gradlew assembleDebug # 또는 assembleRelease
      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk # APK 경로 확인 필수
